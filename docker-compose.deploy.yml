version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: lims-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pgadmin}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lims_network

  backend:
    image: ${DOCKERHUB_USERNAME}/lims-backend:${IMAGE_TAG}
    container_name: lims-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USERNAME=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-pgadmin}
      - JWT_SECRET=${JWT_SECRET:-dd31024a0a07692cb8141c6190d05095d9a891784064006bb2ace1b5ea1f876542aba5b23f64d53926a8e61d41262605d80cd3a85255151af93324b28f565823}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,https://lims.wemurz.com,https://www.lims.wemurz.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_BMQDVeYN_166iqQ3dK6xiCq66Ay8vXqWv}
      - EMAIL_FROM_DOMAIN=${EMAIL_FROM_DOMAIN:-programmingprophet.site}
    networks:
      - lims_network

  frontend:
    image: ${DOCKERHUB_USERNAME}/lims-frontend:${IMAGE_TAG}
    container_name: lims-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}
    networks:
      - lims_network

volumes:
  pgdata:

networks:
  lims_network:
    driver: bridge
