# version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: lims-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgadmin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lims

  app:
    build: .
    container_name: lims-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=pgadmin
      - JWT_SECRET=e8a34e143ae0aee52c6a6a46a04dfb3670f1b20ae361e46829b67f55e31692dcce300ec047eef62fdad17c7457e85b0fb774f660b1720db2cb33e970f18da956
      - JWT_EXPIRATION=900000
      - JWT_REFRESH_EXPIRATION=604800000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - lims

volumes:
  pgdata:

networks:
  lims:
